<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メッセージ</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(to bottom,#f8f7ff,#eef5ff);
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:700px;
    text-align:center;
    z-index:2;
}

#envelope{
    font-size:120px;
    cursor:pointer;
    transition:.3s;
}

#envelope:hover{
    transform:scale(1.05);
}

#loading{
    display:none;
}

.progress{
    width:80%;
    max-width:400px;
    height:12px;
    background:#ddd;
    margin:20px auto;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#7b68ee;
}

#paper{
    display:none;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    animation:appear .8s ease;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

#fortune{
    font-size:1.4rem;
    margin-bottom:20px;
    color:#6a5acd;
    font-weight:bold;
}

#message{
    line-height:2;
    color:#333;
}

.petal{
    position:fixed;
    top:-30px;
    font-size:24px;
    animation:fall linear forwards;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>

</head>
<body>

<div class="container">


<div id="start">
    <div id="envelope">📩</div>
    <p>タップしてメッセージを開く</p>
</div>

<div id="loading">
    <h2>メッセージを復元しています...</h2>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <p id="percent">0%</p>
</div>

<div id="paper">

    <div id="fortune"></div>

    <div id="message">

        QRコードを読み取ってくれてありがとう。<br><br>

        二週間という短い期間でしたが、みなさんと一緒に過ごせて
        楽しかったです。<br><br>

        直接授業を行うことはありませんでしたが、HRや掃除、放課後の様子などから、
        みなさんの頑張る姿や仲の良い様子を見ることができ、たくさん元気をもらいました。<br><br>

        これからも、自分らしく
        いろいろなことに挑戦してください。<br><br>

        みなさんのこれからを応援しています。<br><br>

        本当にありがとうございました。<br><br>

        ― 教育実習生 前田真由子 ―

    </div>

</div>


</div>

<script>

const fortunes = [
    "🔮 今日の運勢：大吉",
    "🌟 今日の運勢：中吉",
    "🍀 今日の運勢：吉",
    "🎯 今日の運勢：努力が実る日",
    "📚 今日の運勢：勉強運UP",
    "😴 今日の運勢：早寝すると吉",
    "🎵 今日の運勢：好きな曲を聴くと吉"
];

document.getElementById("envelope").onclick = () => {

    document.getElementById("start").style.display="none";
    document.getElementById("loading").style.display="block";

    let p = 0;

    const timer = setInterval(()=>{

        p += Math.floor(Math.random()*8)+3;

        if(p >= 100){
            p = 100;
        }

        document.getElementById("bar").style.width = p + "%";
        document.getElementById("percent").textContent = p + "%";

        if(p === 100){

            clearInterval(timer);

            setTimeout(()=>{

                document.getElementById("loading").style.display="none";

                createPetals();

                document.getElementById("fortune").textContent =
                    fortunes[Math.floor(Math.random()*fortunes.length)];

                document.getElementById("paper").style.display="block";

            },600);
        }

    },120);

};

function createPetals(){

    for(let i=0;i<25;i++){

        const petal = document.createElement("div");

        petal.className = "petal";
        petal.innerHTML = "🪻";

        petal.style.left = Math.random()*100 + "vw";
        petal.style.animationDuration =
            (Math.random()*3 + 4) + "s";

        document.body.appendChild(petal);

        setTimeout(()=>{
            petal.remove();
        },7000);
    }
}

</script>

</body>
</html>
